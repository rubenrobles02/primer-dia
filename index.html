<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Primer Día ❤️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #game {
      width: 860px;
      height: 484px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }

    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 0.6s ease;
    }
    #bg::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.72));
    }

    .sprite {
      position: absolute;
      bottom: 118px;
      height: 340px;
      object-fit: cover;
      object-position: top center;
      transition: all 0.4s ease;
      z-index: 2;
    }
    #sprite-ruben {
      left: 40px;
      transform: scaleX(-1);
      filter: drop-shadow(-4px 0 24px rgba(167,139,250,0.4));
    }
    #sprite-pablo {
      right: 40px;
      filter: drop-shadow(4px 0 24px rgba(52,211,153,0.4));
    }
    .sprite.gone   { opacity:0; transform:scaleX(-1) translateX(-30px); pointer-events:none; }
    #sprite-pablo.gone { transform:translateX(30px); }
    .sprite.dim    { filter:brightness(0.3) saturate(0.2); }
    #sprite-pablo.dim { filter:brightness(0.3) saturate(0.2); }

    #scene-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
      transition: opacity 0.5s ease;
    }
    #scene-img.gone { opacity:0; pointer-events:none; }

    #dialog {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(6,6,18,0.93);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 13px 22px 17px;
      cursor: pointer;
      z-index: 10;
      user-select: none;
    }
    #speaker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #text {
      font-size: 15px;
      color: #e8e8f0;
      line-height: 1.65;
      min-height: 50px;
    }
    #hint {
      position: absolute;
      bottom: 9px; right: 16px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:.7} }

    #label {
      position: absolute;
      top: 13px; left: 13px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.07);
    }

    #prog {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #a78bfa, #34d399);
      transition: width 0.4s ease;
      z-index: 20;
    }

    #title {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; cursor: pointer;
    }
    #title h1 {
      font-size: 50px; font-weight: 200;
      color: white; letter-spacing: 6px; margin-bottom: 6px;
    }
    #title .sub {
      color: rgba(255,255,255,0.38); font-size: 12px;
      letter-spacing: 2px; margin-bottom: 48px;
    }
    #title .btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.8);
      padding: 11px 36px; border-radius: 30px;
      font-size: 13px; cursor: pointer; letter-spacing: 1px;
      transition: all 0.3s;
    }
    #title .btn:hover { background: rgba(255,255,255,0.13); }

    .stars { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
    .star {
      position:absolute; background:white; border-radius:50%;
      animation: twinkle var(--d) infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:var(--o)} }

    #end {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0f0c29, #1a0533, #0d1b2a);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #end .heart { font-size:40px; animation:heartbeat 1.4s infinite; margin-bottom:18px; }
    @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    #end h2 { font-size:36px; color:white; font-weight:200; letter-spacing:4px; margin-bottom:8px; }
    #end p  { color:rgba(255,255,255,0.38); font-size:12px; letter-spacing:1px; }

    /* ── Particles & FX ──────────────────────────────────────── */
    #particles {
      position: absolute; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 5;
    }
    .petal {
      position: absolute; top: -18px;
      width: 10px; height: 9px;
      border-radius: 50% 50% 50% 0;
      animation: petalFall linear forwards;
    }
    @keyframes petalFall {
      0%   { transform: translateX(0) rotate(0deg);   opacity: 0.9; }
      100% { transform: translateX(var(--dx)) rotate(var(--rot)) translateY(520px); opacity: 0; }
    }
    .heart-p {
      position: absolute;
      font-size: 20px;
      animation: heartUp ease-out forwards;
    }
    @keyframes heartUp {
      0%   { transform: translateY(0)     scale(0.4); opacity: 1; }
      100% { transform: translateY(-120px) scale(1.3); opacity: 0; }
    }
    @keyframes gameShake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      12%     { transform: translate(-9px,2px) rotate(-0.5deg); }
      25%     { transform: translate(9px,-2px) rotate(0.5deg); }
      37%     { transform: translate(-7px,3px) rotate(-0.3deg); }
      50%     { transform: translate(7px,-1px) rotate(0.3deg); }
      62%     { transform: translate(-4px,1px) rotate(-0.2deg); }
      75%     { transform: translate(4px,-1px) rotate(0.2deg); }
    }
    #game.shake { animation: gameShake 0.55s ease; }

    /* ── Track indicator (subtle) ────────────────────────────── */
    #track-dot {
      position: absolute; top: 13px; right: 52px;
      width: 6px; height: 6px; border-radius: 50%;
      z-index: 20; opacity: 0.4;
      transition: background 1s ease;
    }
  </style>
</head>
<body>
<div id="game">
  <div id="prog"></div>

  <div id="title">
    <div class="stars" id="stars"></div>
    <h1>El Primer Día</h1>
    <p class="sub">Una historia de Ruben &amp; Pablo</p>
    <button class="btn" onclick="start()">▶ Comenzar</button>
  </div>

  <div id="end">
    <div class="heart">❤️</div>
    <h2>Fin</h2>
    <p>Un día que no se olvidará</p>
  </div>

  <button id="muteBtn" onclick="toggleBGM()" style="position:absolute;top:12px;right:12px;z-index:20;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.1);color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">🔊</button>
  <div id="track-dot"></div>

  <div id="bg"></div>
  <img id="scene-img" class="gone" src="" alt="">
  <div id="particles"></div>
  <div id="label"></div>

  <img id="sprite-ruben" class="sprite gone" src="rubenanimefinal.png" alt="Ruben">
  <img id="sprite-pablo" class="sprite gone" src="pabloanime final.png" alt="Pablo">

  <div id="dialog" onclick="skipOrNext()">
    <div id="speaker"></div>
    <div id="text"></div>
    <div id="hint">▼ clic · espacio · →</div>
  </div>
</div>

let idx = 0;

function start() {
  document.getElementById('title').style.display = 'none';
  startBGM();
  render(0);
}

function render(i) {
  const s = scenes[i];
  document.getElementById('prog').style.width = ((i / scenes.length) * 100) + '%';
  document.getElementById('label').textContent = s.label;

  // BGM track switch
  if (s.bgm) switchTrack(s.bgm);

  // Particle FX
  if ('fx' in s) {
    clearFx();
    if (s.fx) startFx(s.fx);
  }

  // Background / scene image
  const bgEl    = document.getElementById('bg');
  const sceneImg = document.getElementById('scene-img');

  if (s.bg.startsWith('img:')) {
    const file = s.bg.slice(4);
    bgEl.style.background = '#111';
    sceneImg.src = file;
    sceneImg.style.objectPosition = s.imgPos || 'center';
    sceneImg.classList.remove('gone');
  } else {
    bgEl.style.background = s.bg;
    sceneImg.classList.add('gone');
  }

  // Sprites
  setSprite(document.getElementById('sprite-ruben'), s.ruben);
  setSprite(document.getElementById('sprite-pablo'), s.pablo);

  // Dialog
  const sp = document.getElementById('speaker');
  sp.textContent = s.who.name;
  sp.style.color = s.who.color;
  typeText(s.text, s.who);
}

function setSprite(el, state) {
  el.classList.remove('gone', 'dim');
  if (!state) el.classList.add('gone');
  else if (state === 'dim') el.classList.add('dim');
}

// ─── Typewriter + voces Animal Crossing ──────────────────────────────────────
let twTimer = null;
let twDone  = false;

const VOICES = {
  'Ruben':    { freq: 260, type: 'sine',     speed: 38 },
  'Pablo':    { freq: 400, type: 'sine',     speed: 36 },
  'Narrador': { freq: 175, type: 'triangle', speed: 30 },
  '???':      { freq: 145, type: 'sawtooth', speed: 40 },
  'Ciclista': { freq: 510, type: 'sine',     speed: 36 },
};

function playVoice(freq, type) {
  if (!actx) return;
  // Variación aleatoria estilo Animal Crossing: ±2 semitonos
  const cents = (Math.random() - 0.5) * 400;
  const f0 = freq * Math.pow(2, cents / 1200);

  const o  = actx.createOscillator();
  const g  = actx.createGain();
  const bp = actx.createBiquadFilter();

  o.connect(bp); bp.connect(g); g.connect(actx.destination);

  o.type = type;
  o.frequency.value = f0;

  // Filtro bandpass centrado: da el timbre nasal de AC
  bp.type = 'bandpass';
  bp.frequency.value = f0 * 1.8;
  bp.Q.value = 4;

  const t = actx.currentTime;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.32, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.052);
  o.start(t);
  o.stop(t + 0.06);
}

function typeText(fullText, who) {
  clearTimeout(twTimer);
  twDone = false;
  const el = document.getElementById('text');
  el.textContent = '';
  const v = VOICES[who.name] || VOICES['Narrador'];
  let i = 0;

  function tick() {
    if (i >= fullText.length) { twDone = true; return; }
    el.textContent += fullText[i];
    const ch = fullText[i];
    if (ch !== ' ' && ch !== '\n') playVoice(v.freq, v.type);
    i++;
    twTimer = setTimeout(tick, v.speed);
  }
  tick();
}

function skipOrNext() {
  if (!twDone) {
    clearTimeout(twTimer);
    twDone = true;
    document.getElementById('text').textContent = scenes[idx].text;
    return;
  }
  playClick();
  idx++;
  if (idx >= scenes.length) {
    document.getElementById('end').style.display = 'flex';
  } else {
    render(idx);
  }
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let actx = null;
let bgmActive = false;
let bgmTimer  = null;
let currentTrackId = 'A';

function initAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}

function playClick() {
  initAudio();
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(1100, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(500, actx.currentTime + 0.07);
  g.gain.setValueAtTime(0.18, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.07);
  o.start(actx.currentTime);
  o.stop(actx.currentTime + 0.08);
}

function note(freq, t, dur, vol, oscType, filterHz) {
  const o = actx.createOscillator();
  const g = actx.createGain();
  const f = actx.createBiquadFilter();
  o.connect(f); f.connect(g); g.connect(actx.destination);
  o.type = oscType || 'triangle';
  f.type = 'lowpass'; f.frequency.value = filterHz || 2200;
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.05);
  g.gain.setValueAtTime(vol, t + 0.12);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.1);
}

const TRACK_COLORS = { A:'#a78bfa', B:'#f472b6', C:'#fb923c' };

function switchTrack(id) {
  if (currentTrackId === id) return;
  currentTrackId = id;
  clearTimeout(bgmTimer);
  document.getElementById('track-dot').style.background = TRACK_COLORS[id];
  if (bgmActive) scheduleBGM();
}

function scheduleBGM() {
  if (!bgmActive) return;
  initAudio();
  const tr = TRACKS[currentTrackId];
  let t = actx.currentTime + 0.15;

  tr.melody.forEach(([freq, dur], i) => {
    note(freq, t + i * tr.step, dur, tr.vol, tr.osc, tr.filter);
  });
  tr.bass.forEach((freq, i) => {
    note(freq, t + i * tr.step * 2, 2.0, tr.vol * 0.65, tr.osc, tr.filter * 0.7);
  });

  const loopMs = tr.melody.length * tr.step * 1000 + 900;
  bgmTimer = setTimeout(scheduleBGM, loopMs);
}

function startBGM() {
  if (bgmActive) return;
  bgmActive = true;
  document.getElementById('track-dot').style.background = TRACK_COLORS[currentTrackId];
  scheduleBGM();
}

function toggleBGM() {
  bgmActive = !bgmActive;
  clearTimeout(bgmTimer);
  document.getElementById('muteBtn').textContent = bgmActive ? '🔊' : '🔇';
  if (bgmActive) scheduleBGM();
}

// ─── Partículas FX ───────────────────────────────────────────────────────────
const particlesEl = document.getElementById('particles');
let pfxInterval = null;

function clearFx() {
  clearInterval(pfxInterval);
  pfxInterval = null;
  particlesEl.innerHTML = '';
  document.getElementById('game').classList.remove('shake');
}

function startFx(type) {
  if (type === 'shake') {
    // Sólo el shake — no hay loop, es instantáneo
    const g = document.getElementById('game');
    g.classList.remove('shake');
    void g.offsetWidth; // reflow para reiniciar animación
    g.classList.add('shake');
    setTimeout(() => g.classList.remove('shake'), 600);
    return;
  }

  if (type === 'petals') {
    pfxInterval = setInterval(() => {
      if (particlesEl.children.length > 45) return;
      const p = document.createElement('div');
      p.className = 'petal';
      const hue = 330 + Math.random() * 30;
      const sat = 70 + Math.random() * 20;
      const lit = 80 + Math.random() * 10;
      p.style.cssText = [
        `left:${Math.random()*105-2}%`,
        `animation-duration:${3.5 + Math.random()*3}s`,
        `animation-delay:${Math.random()*1.5}s`,
        `background:hsl(${hue},${sat}%,${lit}%)`,
        `--dx:${(Math.random()-0.5)*80}px`,
        `--rot:${540 + Math.random()*360}deg`,
        `transform:rotate(${Math.random()*360}deg)`,
        `width:${8+Math.random()*6}px`,
        `height:${7+Math.random()*5}px`,
        `opacity:${0.7+Math.random()*0.3}`,
      ].join(';');
      particlesEl.appendChild(p);
      setTimeout(() => p.remove(), 7000);
    }, 180);
  }

  if (type === 'hearts') {
    pfxInterval = setInterval(() => {
      if (particlesEl.children.length > 18) return;
      const p = document.createElement('div');
      p.className = 'heart-p';
      p.textContent = ['❤️','💕','💖','✨','🧡'][Math.floor(Math.random()*5)];
      p.style.cssText = [
        `left:${15 + Math.random()*70}%`,
        `bottom:${100 + Math.random()*80}px`,
        `font-size:${14+Math.random()*12}px`,
        `animation-duration:${2.2+Math.random()*1.8}s`,
        `animation-delay:${Math.random()*1}s`,
      ].join(';');
      particlesEl.appendChild(p);
      setTimeout(() => p.remove(), 4500);
    }, 280);
  }
}

document.addEventListener('keydown', e => {

    if (document.getElementById('title').style.display !== 'none') return;
    e.preventDefault();
    skipOrNext();

});
