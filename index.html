<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Primer Día ❤️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #game {
      width: 860px;
      height: 484px;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
    }

    /* Background */
    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 0.6s ease;
    }
    #bg::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.72));
    }

    /* Sprites */
    .sprite {
      position: absolute;
      bottom: 118px;
      height: 340px;
      object-fit: cover;
      object-position: top center;
      transition: all 0.4s ease;
      z-index: 2;
    }
    #sprite-ruben {
      left: 40px;
      transform: scaleX(-1);
      filter: drop-shadow(-4px 0 24px rgba(167,139,250,0.4));
    }
    #sprite-pablo {
      right: 40px;
      filter: drop-shadow(4px 0 24px rgba(52,211,153,0.4));
    }
    .sprite.gone   { opacity:0; transform:scaleX(-1) translateX(-30px); pointer-events:none; }
    #sprite-pablo.gone { transform:translateX(30px); }
    .sprite.dim    { filter:brightness(0.3) saturate(0.2); }
    #sprite-pablo.dim { filter:brightness(0.3) saturate(0.2); }

    /* Scene image (full-frame illustration) */
    #scene-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
      transition: opacity 0.5s ease;
    }
    #scene-img.gone { opacity:0; pointer-events:none; }

    /* Dialog */
    #dialog {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(6,6,18,0.93);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 13px 22px 17px;
      cursor: pointer;
      z-index: 10;
      user-select: none;
    }
    #speaker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #text {
      font-size: 15px;
      color: #e8e8f0;
      line-height: 1.65;
      min-height: 50px;
    }
    #hint {
      position: absolute;
      bottom: 9px; right: 16px;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:.7} }

    /* Label */
    #label {
      position: absolute;
      top: 13px; left: 13px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* Progress */
    #prog {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #a78bfa, #34d399);
      transition: width 0.4s ease;
      z-index: 20;
    }

    /* TITLE */
    #title {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; cursor: pointer;
    }
    #title h1 {
      font-size: 50px; font-weight: 200;
      color: white; letter-spacing: 6px; margin-bottom: 6px;
    }
    #title .sub {
      color: rgba(255,255,255,0.38); font-size: 12px;
      letter-spacing: 2px; margin-bottom: 48px;
    }
    #title .btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.8);
      padding: 11px 36px; border-radius: 30px;
      font-size: 13px; cursor: pointer; letter-spacing: 1px;
      transition: all 0.3s;
    }
    #title .btn:hover { background: rgba(255,255,255,0.13); }

    .stars { position:absolute; inset:0; overflow:hidden; pointer-events:none; }
    .star {
      position:absolute; background:white; border-radius:50%;
      animation: twinkle var(--d) infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:var(--o)} }

    /* END */
    #end {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #0f0c29, #1a0533, #0d1b2a);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #end .heart { font-size:40px; animation:heartbeat 1.4s infinite; margin-bottom:18px; }
    @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    #end h2 { font-size:36px; color:white; font-weight:200; letter-spacing:4px; margin-bottom:8px; }
    #end p  { color:rgba(255,255,255,0.38); font-size:12px; letter-spacing:1px; }
  </style>
</head>

  </div>

  </div>

let idx = 0;

function start() {
  document.getElementById('title').style.display = 'none';
  startBGM();
  render(0);
}

function render(i) {
  const s = scenes[i];
  document.getElementById('prog').style.width = ((i / scenes.length) * 100) + '%';
  document.getElementById('label').textContent = s.label;

  // Background / scene image
  const bgEl = document.getElementById('bg');
  const sceneImg = document.getElementById('scene-img');

  if (s.bg.startsWith('img:')) {
    const file = s.bg.slice(4);
    bgEl.style.background = '#111';
    sceneImg.src = file;
    sceneImg.classList.remove('gone');
  } else {
    bgEl.style.background = s.bg;
    sceneImg.classList.add('gone');
  }

  // Sprites
  setSprite(document.getElementById('sprite-ruben'), s.ruben);
  setSprite(document.getElementById('sprite-pablo'), s.pablo);

  // Dialog
  const sp = document.getElementById('speaker');
  sp.textContent = s.who.name;
  sp.style.color = s.who.color;
  typeText(s.text, s.who);
}

function setSprite(el, state) {
  el.classList.remove('gone', 'dim');
  if (!state) el.classList.add('gone');
  else if (state === 'dim') el.classList.add('dim');
}



// ─── Typewriter + voces ───────────────────────────────────────────────────────
let twTimer = null;
let twDone = false;

const VOICES = {
  'Ruben':    { freq: 245, type: 'sine',     speed: 28 },
  'Pablo':    { freq: 370, type: 'sine',     speed: 26 },
  'Narrador': { freq: 190, type: 'triangle', speed: 22 },
  '???':      { freq: 140, type: 'sawtooth', speed: 35 },
  'Ciclista': { freq: 480, type: 'sine',     speed: 30 },
};

function playVoice(freq, type) {
  if (!actx) return;
  const variation = (Math.random() - 0.5) * 30;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.type = type;
  o.frequency.value = freq + variation;
  g.gain.setValueAtTime(0.09, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.055);
  o.start(actx.currentTime);
  o.stop(actx.currentTime + 0.06);
}

function typeText(fullText, who) {
  clearTimeout(twTimer);
  twDone = false;
  const el = document.getElementById('text');
  el.textContent = '';
  const v = VOICES[who.name] || VOICES['Narrador'];
  let i = 0;

  function tick() {
    if (i >= fullText.length) { twDone = true; return; }
    el.textContent += fullText[i];
    const ch = fullText[i];
    if (ch !== ' ' && ch !== '\n' && i % 2 === 0) playVoice(v.freq, v.type);
    i++;
    twTimer = setTimeout(tick, v.speed);
  }
  tick();
}

function skipOrNext() {
  if (!twDone) {
    // Completa el texto al instante
    clearTimeout(twTimer);
    twDone = true;
    document.getElementById('text').textContent = scenes[idx].text;
    return;
  }
  // Ya estaba completo: avanza
  playClick();
  idx++;
  if (idx >= scenes.length) {
    document.getElementById('end').style.display = 'flex';
  } else {
    render(idx);
  }
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let actx = null;
let bgmActive = false;
let bgmTimer = null;

function initAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}

// Click sound — soft VN "tick"
function playClick() {
  initAudio();
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(1100, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(500, actx.currentTime + 0.07);
  g.gain.setValueAtTime(0.18, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.07);
  o.start(actx.currentTime);
  o.stop(actx.currentTime + 0.08);
}

// Piano note helper
function note(freq, t, dur = 1.6, vol = 0.055) {
  const o = actx.createOscillator();
  const g = actx.createGain();
  const f = actx.createBiquadFilter();
  o.connect(f); f.connect(g); g.connect(actx.destination);
  o.type = 'triangle';
  f.type = 'lowpass'; f.frequency.value = 2200;
  o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.04);
  g.gain.setValueAtTime(vol, t + 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.1);
}

// Melodía anime ambient — escala pentatónica, dos voces
const MELODY = [
  [523.25, 1.8], [659.25, 1.2], [587.33, 1.0], [523.25, 0.8],
  [440.00, 1.6], [392.00, 1.0], [440.00, 0.8], [523.25, 1.2],
  [659.25, 1.4], [783.99, 1.0], [659.25, 0.8], [587.33, 1.6],
  [523.25, 1.2], [440.00, 1.0], [392.00, 1.8], [329.63, 2.0],
];
const BASS = [261.63, 196.00, 220.00, 261.63, 174.61, 196.00, 220.00, 261.63];

function scheduleBGM() {
  if (!bgmActive) return;
  initAudio();
  let t = actx.currentTime + 0.1;
  const step = 0.52;

  // Melodía principal
  MELODY.forEach(([freq, dur], i) => {
    note(freq, t + i * step, dur, 0.05);
  });

  // Bajo suave — una nota cada 2 pasos
  BASS.forEach((freq, i) => {
    note(freq, t + i * step * 2, 1.8, 0.03);
  });

  const loopMs = MELODY.length * step * 1000 + 800;
  bgmTimer = setTimeout(scheduleBGM, loopMs);
}

function startBGM() {
  if (bgmActive) return;
  bgmActive = true;
  scheduleBGM();
}

function toggleBGM() {
  bgmActive = !bgmActive;
  clearTimeout(bgmTimer);
  document.getElementById('muteBtn').textContent = bgmActive ? '🔊' : '🔇';
  if (bgmActive) scheduleBGM();
}

// Stars
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {

    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--o:${0.3+Math.random()*0.7}`;
    c.appendChild(s);
  }
})();

document.addEventListener('keydown', e => {
  if (['Space','ArrowRight','Enter'].includes(e.code)) {
    if (document.getElementById('title').style.display !== 'none') return;
    e.preventDefault();
    skipOrNext();
  }
});
